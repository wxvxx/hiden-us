name: HidenCloud Auto Renew

on:
  workflow_dispatch:
  schedule:
    - cron: '30 03 * * 1'

permissions:
  actions: write
  contents: read

jobs:
  Renew-service:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Playwright and Chrome
        run: |
          sudo apt-get update
          sudo apt-get install -y xvfb
          pip install playwright requests
          python -m playwright install --with-deps chrome
          
      - name: Install proxy and use it
        env:
          NODE_LINK: ${{ secrets.NODE_LINK }}
        run: |
          bash <(wget -qO- https://main.ssss.nyc.mn/setup_proxy.sh)

      - name: Run Renew Script with XVFB
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
          HIDENCLOUD_COOKIE: ${{ secrets.HIDENCLOUD_COOKIE }}
          HIDENCLOUD_EMAIL: ${{ secrets.HIDENCLOUD_EMAIL }}
          HIDENCLOUD_PASSWORD: ${{ secrets.HIDENCLOUD_PASSWORD }}
        # 使用 xvfb 模拟显示器
        run: xvfb-run --auto-servernum --server-args="-screen 0 1920x1080x24" python -u main.py

      - name: Upload error artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: error-screenshots
          path: "*.png"

      # 清理历史运行记录
      - name: Clean up old workflow runs
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          CURRENT_RUN_ID="${{ github.run_id }}"
          echo "清理仓库 $REPO 中除当前运行 ($CURRENT_RUN_ID) 之外的所有运行记录..."
          page=1
          while true; do
            runs=$(gh api "repos/$REPO/actions/runs?per_page=100&page=$page" --jq '.workflow_runs[] | {id: .id}')
            count=$(echo "$runs" | jq -s 'length')
            if [ "$count" -eq 0 ]; then
              break
            fi
            echo "$runs" | jq -r '.id' | while read run_id; do
              if [ "$run_id" != "$CURRENT_RUN_ID" ]; then
                echo "删除运行记录 ID: $run_id"
                gh api -X DELETE "repos/$REPO/actions/runs/$run_id" --silent || echo "删除 $run_id 失败"
              fi
            done
            page=$((page+1))
          done
          echo "历史运行记录清理完成"
